# Bridge configuration for UserPassword.
# Routes and auth schema drive bridge code generation.
# Remove a route to stop generating its handler — write your own in routes.go.

entity: UserPassword
repo: auth/userpasswords
domain: auth

auth_relations:
  - "owner(user, service_account)"

auth_permissions:
  - "list(owner)"
  - "create(authenticated)"
  - "read(owner)"
  - "update(owner)"
  - "delete(owner)"
  - "manage(owner)"

routes:
  - func: List
    path: /user-passwords
    middleware:
      - authenticate: any
      - rate_limit
      - authorize:
          pattern: prefilter
          permission: read

  - func: Get
    path: /user-passwords/{user_id}
    middleware:
      - authenticate: any
      - rate_limit
      - authorize:
          permission: read
          param: user_id

  - func: Create
    path: /user-passwords
    middleware:
      - max_body_size: 1048576
      - authenticate: any
      - rate_limit
    auth_create:
      - "user_password:{user_id}#owner@{=subject}"

  - func: Update
    path: /user-passwords/{user_id}
    middleware:
      - max_body_size: 1048576
      - authenticate: any
      - rate_limit
      - authorize:
          permission: update
          param: user_id

  - func: Delete
    path: /user-passwords/{user_id}
    middleware:
      - authenticate: any
      - rate_limit
      - authorize:
          permission: delete
          param: user_id
