# Bridge configuration for VerificationToken.
# Routes and auth schema drive bridge code generation.
# Remove a route to stop generating its handler — write your own in routes.go.

entity: VerificationToken
repo: auth/verificationtokens
domain: auth

auth_relations:
  - "owner(user, service_account)"

auth_permissions:
  - "list(owner)"
  - "create(authenticated)"
  - "read(owner)"
  - "update(owner)"
  - "delete(owner)"
  - "manage(owner)"

routes:
  - func: List
    path: /verification-tokens
    middleware:
      - authenticate: any
      - rate_limit
      - authorize:
          pattern: prefilter
          permission: read

  - func: Get
    path: /verification-tokens/{token_id}
    middleware:
      - authenticate: any
      - rate_limit
      - authorize:
          permission: read
          param: token_id

  - func: Create
    path: /verification-tokens
    middleware:
      - max_body_size: 1048576
      - authenticate: any
      - rate_limit
    auth_create:
      - "verification_token:{token_id}#owner@{=subject}"

  - func: Update
    path: /verification-tokens/{token_id}
    middleware:
      - max_body_size: 1048576
      - authenticate: any
      - rate_limit
      - authorize:
          permission: update
          param: token_id

  - func: Delete
    path: /verification-tokens/{token_id}
    middleware:
      - authenticate: any
      - rate_limit
      - authorize:
          permission: delete
          param: token_id
