# Bridge configuration for EventOutbox.
# Routes and auth schema drive bridge code generation.
# Remove a route to stop generating its handler — write your own in routes.go.

entity: EventOutbox
repo: events/eventoutbox
domain: events

auth_relations:
  - "owner(user, service_account)"

auth_permissions:
  - "list(owner)"
  - "create(authenticated)"
  - "read(owner)"
  - "update(owner)"
  - "delete(owner)"
  - "manage(owner)"

routes:
  - func: List
    path: /event-outbox
    middleware:
      - authenticate: any
      - rate_limit
      - authorize:
          pattern: prefilter
          permission: read

  - func: Get
    path: /event-outbox/{event_id}
    middleware:
      - authenticate: any
      - rate_limit
      - authorize:
          permission: read
          param: event_id

  - func: Create
    path: /event-outbox
    middleware:
      - max_body_size: 1048576
      - authenticate: any
      - rate_limit
    auth_create:
      - "event_outbox:{event_id}#owner@{=subject}"

  - func: Update
    path: /event-outbox/{event_id}
    middleware:
      - max_body_size: 1048576
      - authenticate: any
      - rate_limit
      - authorize:
          permission: update
          param: event_id

  - func: Delete
    path: /event-outbox/{event_id}
    middleware:
      - authenticate: any
      - rate_limit
      - authorize:
          permission: delete
          param: event_id
